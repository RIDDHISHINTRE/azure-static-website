<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Azure Static Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(120deg, #e0f7fa, #e1bee7);
            text-align: center;
        }

        header {
            background-color: #0078D4;
            color: white;
            padding: 20px;
        }

        section {
            margin-top: 80px;
        }

        .card {
            background: white;
            display: inline-block;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
            width: 300px;
        }

        footer {
            margin-top: 100px;
            padding: 10px;
            background: #333;
            color: white;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #0078D4;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #005a9e;
        }
    </style>
</head>

<body>

<header>
    <h1>Welcome to My Azure Website</h1>
</header>

<section>
    <div class="card">
        <h2>Static Website</h2>
        <p>This website is hosted on a cloud virtual machine using Azure.</p>
        <button onclick="showMessage()">Click Me</button>
        <p id="msg"></p>
    </div>
</section>

<footer>
    <p>Deployed using Microsoft Azure VM</p>
</footer>

<script>
    function showMessage() {
        document.getElementById("msg").innerHTML =
            "Hello! Website is running successfully 🚀";
    }
</script>

</body>
</html>
